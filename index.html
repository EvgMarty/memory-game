<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Memory Game</title>

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel" aria-label="Memory game">
        <!-- Navigation -->
        <header class="toolbar">
          <div class="toolbar__left">
            <div class="stats">
              <div class="pill">
                Moves:
                <b id="moves">0</b>
              </div>
              <div class="pill">
                Time:
                <b id="time">0:00</b>
              </div>
              <div class="pill">
                Pairs:
                <b id="pairs">0/0</b>
              </div>
            </div>
          </div>
          <div class="toolbar__right">
            <div class="select" title="Number of pairs">
              <span>Pairs:</span>
              <select id="pairsSelect">
                <option value="4">4</option>
                <option value="6" selected>6</option>
                <option value="8">8</option>
                <option value="12">12</option>
                <option value="24">24</option>
              </select>
            </div>

            <div class="volume" title="Sound volume">
              <span class="volume__label">Sound:</span>
              <input
                id="volume"
                class="volume__range"
                type="range"
                min="0"
                max="100"
                value="60"
              />
              <span id="volumeValue" class="volume__value">60%</span>
            </div>

            <button id="restartBtn" class="btn btn--primary">Reset</button>
          </div>
        </header>
        <div id="grid" class="grid" aria-label="Game board"></div>
      </section>
    </main>

    <div
      id="overlay"
      class="overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="winTitle"
    >
      <div class="modal">
        <h2 id="winTitle" class="modal__title">You win! 🎉</h2>
        <p id="winText" class="modal__text">You found all the pairs.</p>
        <div class="modal__actions">
          <button id="playAgainBtn" class="btn btn--primary">Play again</button>
          <button id="closeBtn" class="btn">Close</button>
        </div>
      </div>
    </div>

    <script src="./js/main.js"></script>
  </body>
</html>
